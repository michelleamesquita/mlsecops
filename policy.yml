# policy.yml — Machine-readable MLSecOps Security Policy
# Lido por scripts/compliance_check.py para enforcement automatizado.
# Ref: OWASP MLSVS 1.0 · MITRE ATLAS 2024 · NIST AI RMF 1.0

version: "1.0"
last_updated: "2025-01-01"

frameworks:
  - owasp_mlsvs: "1.0"
  - mitre_atlas: "2024"
  - nist_ai_rmf: "1.0"
  - openssf_mlsecops: "2025"
  - slsa: "L1"

# ── Estágio 01 — Data Quality Gate ──────────────────────────────────────────
data_quality:

  integrity:
    result_file: "results/integrity_report.json"
    field: "passed"
    expected: true
    blocking: true
    blocking_when_missing: false   # gerado em data-validation.yml; SKIP se ausente aqui
    atlas: "AML.T0010"
    mlsvs: "V2"
    note: "Verified by data-validation pipeline stage"

  schema_validation:
    result_file: "results/ge_report.json"
    field: "passed"
    expected: true
    blocking: true
    blocking_when_missing: false   # gerado em data-validation.yml; SKIP se ausente aqui
    atlas: "AML.T0020"
    mlsvs: "V3"
    note: "Verified by data-validation pipeline stage"

  label_noise:
    result_file: "results/label_noise_report.json"
    field: "passed"
    expected: true
    blocking: true
    blocking_when_missing: false   # gerado em data-validation.yml; SKIP se ausente aqui
    threshold_field: "noise_rate"
    max_threshold: 0.05
    atlas: "AML.T0020"
    mlsvs: "V3"
    note: "Verified by data-validation pipeline stage"

  poison_detection:
    result_file: "results/poison_report.json"
    field: "passed"
    expected: true
    blocking: false          # WARNING até calibração
    atlas: "AML.T0020"
    mlsvs: "V2"
    note: "Testes KS/Chi2/IQR exigem calibração com baseline. JSD no target é sempre crítico."

  drift:
    result_file: "results/drift_report.json"
    field: "passed"
    expected: true
    blocking: false          # Alerta, não bloqueante
    mlsvs: "V9"

# ── Estágio 02 — Supply-Chain Gate ───────────────────────────────────────────
supply_chain:

  model_scan:
    result_file: "results/model_scan_report.json"
    field: "passed"
    expected: true
    blocking: true
    atlas: "AML.T0010 AML.T0018"
    mlsvs: "V7"

  slsa_manifest:
    result_file: "results/slsa_manifest.json"
    field: "subject"
    check: "not_empty"
    blocking: true
    blocking_when_missing: false   # gerado em secure-experiment.yml; SKIP se ausente aqui
    mlsvs: "V8"
    note: "Verified by secure-experiment pipeline stage"

  sbom:
    result_file: "results/sbom.cdx.json"
    field: "metadata"
    check: "exists"
    blocking: true
    blocking_when_missing: false   # gerado em secure-experiment.yml; SKIP se ausente aqui
    mlsvs: "V8"
    note: "Verified by secure-experiment pipeline stage"

# ── Estágio 03 — Adversarial Gate ────────────────────────────────────────────
adversarial:

  fgsm:
    # Aponta para o relatório de sanitização, não o de ataque.
    # adversarial_fgsm.json mostra que o ataque teve êxito (esperado para RF).
    # sanitization_fgsm.json confirma que a defesa (FeatureSqueezing/Gaussian) recuperou
    # a acurácia acima do threshold — este é o gate real.
    result_file: "results/sanitization_fgsm.json"
    field: "passed"
    expected: true
    blocking: true
    atlas: "AML.T0043 AML.T0015"
    mlsvs: "V5"
    note: "Gate verifica defesa aplicada; calibre threshold com baseline do domínio"

  pgd:
    result_file: "results/sanitization_pgd.json"
    field: "passed"
    expected: true
    blocking: true
    atlas: "AML.T0043 AML.T0015"
    mlsvs: "V5"
    note: "Gate verifica defesa aplicada; calibre threshold com baseline do domínio"

  membership_inference:
    result_file: "results/membership_inference.json"
    field: "passed"
    expected: true
    blocking: true
    threshold_field: "advantage"
    max_threshold: 0.10
    atlas: "AML.T0056"
    mlsvs: "V6"
    note: "Calibre com baseline do domínio antes de tornar bloqueante"

  behavioral_baseline:
    result_file: "results/behavioral_baseline_report.json"
    field: "passed"
    expected: true
    blocking: true
    blocking_when_missing: false   # ausente na primeira execução (sem baseline ainda)
    atlas: "AML.T0018 AML.T0020"
    mlsvs: "V5"
    note: "Skippado na primeira execução (sem baseline). Bloqueante a partir do 2º treino."

  model_extraction:
    result_file: "results/model_extraction_report.json"
    field: "passed"
    expected: true
    blocking: false          # WARNING — bloqueante apenas em ambientes com serving API
    atlas: "AML.T0044"
    mlsvs: "V5"
    note: "Torne bloqueante quando o modelo for exposto via API de inferência"

# ── Override ──────────────────────────────────────────────────────────────────
override:
  require_approvals: 2
  valid_for_hours: 24
  label: "security-override"
  log_to_mlflow: true
