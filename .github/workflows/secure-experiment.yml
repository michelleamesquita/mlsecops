# Workflow 2 — Experimentação Segura (Estágio 02)
# SCA · treino reproduzível · Model Scan · SBOM · SLSA Provenance
#
# GENÉRICO: substitua o step "Train model" pelo seu script de treino.
# Ref: Sotiropoulos ch18 · DevSecOps aplicado ao repo ML

name: secure-experiment

on:
  workflow_call:
  pull_request:
    branches: [main, staging]
    paths:
      - "train_rf.py"
      - "requirements.txt"
      - "scripts/**"

# ── Configuração do projeto ───────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  DATA_CSV: "all_findings_flat.csv"
  TARGET_COLUMN: "is_risky"
  MODEL_OUTPUT_DIR: "model"

jobs:
  sca-and-train:
    name: "SCA + Treino + Model Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write   # Sigstore OIDC

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ── 0. Dados: usa real se existir, gera sintético para CI ─────────────
      - name: Provision dataset (synthetic fallback for CI)
        run: |
          if [ -f "$DATA_CSV" ]; then
            echo "::notice::Dataset real encontrado: $DATA_CSV"
          else
            echo "::warning::$DATA_CSV não encontrado — gerando dataset sintético para CI (5 000 linhas)."
            pip install pandas numpy
            python scripts/generate_ci_data.py \
              --output "$DATA_CSV" --rows 5000 --seed 42
          fi

      # ── SCA — vulnerabilidades em dependências ML ─────────────────────────
      # DevSecOps clássico aplicado ao repo ML (≠ MLSecOps, conforme Agent.md)
      - name: pip-audit (SCA)
        run: |
          pip install pip-audit
          mkdir -p results
          # pip-audit só grava o arquivo se encontrar vulnerabilidades; capturamos ambos os casos
          if pip-audit -r requirements.txt -f markdown -o results/pip-audit.md 2>&1; then
            echo "::notice::pip-audit: No known vulnerabilities found."
            # Garante que o arquivo existe para o upload (mesmo vazio)
            [ -f results/pip-audit.md ] || echo "No known vulnerabilities found." > results/pip-audit.md
          else
            echo "::warning::pip-audit encontrou vulnerabilidades. Veja results/pip-audit.md"
            cat results/pip-audit.md
          fi

      - name: Install ML dependencies
        run: pip install -r requirements.txt

      # ── NB Defense — segurança em notebooks Jupyter ───────────────────────
      # nbdefense não suporta Python ≥3.11 (abandonado).
      # Alternativa: trufflehog para secrets + pip-audit para CVEs em deps de notebooks.
      # OWASP MLSVS V7 · Stage 2 do pipeline AISP
      - name: Notebook security scan (secrets + hardcoded credentials)
        run: |
          mkdir -p results
          # Busca padrões de secrets hardcoded em notebooks
          if ls **/*.ipynb 2>/dev/null | head -1 | grep -q ipynb; then
            echo "Scanning notebooks for hardcoded secrets..."
            grep -rn \
              -e "password\s*=" \
              -e "api_key\s*=" \
              -e "secret\s*=" \
              -e "token\s*=" \
              --include="*.ipynb" . \
              > results/notebook_secrets_scan.txt 2>/dev/null || true
            COUNT=$(wc -l < results/notebook_secrets_scan.txt)
            if [ "$COUNT" -gt "0" ]; then
              echo "::warning::$COUNT linhas suspeitas encontradas em notebooks. Revise results/notebook_secrets_scan.txt"
            else
              echo "::notice::Notebook scan: nenhum padrão suspeito encontrado."
            fi
          else
            echo "Nenhum notebook .ipynb encontrado — scan ignorado."
            echo '{"notebooks_found": 0, "suspicious_lines": 0}' > results/notebook_secrets_scan.txt
          fi
        continue-on-error: true

      # ── Treino reproduzível (seed fixo, MLflow tracking) ──────────────────
      - name: Train model (seed fixo)
        env:
          PYTHONHASHSEED: "42"
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_URI || 'sqlite:///mlflow.db' }}
          DATA_PATH: ${{ env.DATA_CSV }}
          MODEL_OUTPUT_DIR: ${{ env.MODEL_OUTPUT_DIR }}
        run: |
          python train_rf.py \
            --seed 42 \
            --experiment-name "ci-${{ github.sha }}" \
            --sample 200000 \
            --kfold 5

      # ── SHA256 do modelo treinado ─────────────────────────────────────────
      - name: Compute model integrity hash
        run: |
          python scripts/integrity_check.py \
            --files "$MODEL_OUTPUT_DIR" \
            --update \
            --checksums "$MODEL_OUTPUT_DIR/checksums.sha256" \
            --output-dir results/

      # ── Model Scan (ProtectAI) ────────────────────────────────────────────
      # MITRE ATLAS AML.T0010 · AML.T0018 Backdoor
      - name: Install modelscan
        run: pip install modelscan

      - name: Model Scan (backdoor + malicious code detection)
        run: |
          python scripts/model_scan.py \
            --model "$MODEL_OUTPUT_DIR/rf_model.pkl" \
            --output-dir results/

      # ── Sigstore keyless — SLSA provenance ───────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign model artifact (SLSA)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          tar czf model.tar.gz "$MODEL_OUTPUT_DIR"/
          cosign sign-blob --yes model.tar.gz --bundle model.tar.gz.bundle
          echo "::notice::Modelo assinado via Sigstore keyless OIDC"

      # ── Lineage Manifest (provenance chain) ─────────────────────────────
      # MITRE ATLAS AML.T0010 · SLSA Provenance Level 2
      - name: Build Lineage Manifest
        run: |
          python scripts/lineage.py build \
            --data  "$DATA_CSV" \
            --model "$MODEL_OUTPUT_DIR/rf_model.pkl" \
            --config policy.yml requirements.txt \
            --scripts train_rf.py \
            --mlflow-run "${{ env.MLFLOW_RUN_ID }}" \
            --results-dir results/ \
            --output results/lineage_manifest.json
          echo "::notice::Lineage manifest: results/lineage_manifest.json"

      # ── CycloneDX ML BOM (Software Bill of Materials + Model Card) ──────────
      # Gera SBOM completo: dependências Python + ML model card (CycloneDX 1.6)
      # Inclui: algoritmo, features, métricas, dataset provenance, ética
      # ISO/IEC 42001 · OWASP CycloneDX ML BOM · OWASP AIBOM Generator
      - name: Generate ML BOM (CycloneDX 1.6 + model card)
        env:
          # Opcional: se o projeto usa um modelo base do HuggingFace, defina HF_MODEL_ID
          # e o OWASP AIBOM Generator será chamado para gerar o AIBOM do modelo base.
          # Ex: HF_MODEL_ID: "microsoft/codebert-base"
          HF_MODEL_ID: ${{ vars.HF_MODEL_ID || '' }}
        run: |
          mkdir -p results

          # 1. Modelo sklearn local → nosso generate_mlbom.py (sempre executa)
          python scripts/generate_mlbom.py \
            --model   "$MODEL_OUTPUT_DIR/rf_model.pkl" \
            --meta    "$MODEL_OUTPUT_DIR/feature_names.json" \
            --metrics "results/train_metrics_latest.json" \
            --output  results/sbom_ml.cdx.json
          echo "::notice::ML BOM (local model) → results/sbom_ml.cdx.json"

          # 2. OWASP AIBOM Generator (https://genai.owasp.org/resource/owasp-aibom-generator/)
          # Executa apenas se HF_MODEL_ID estiver definido (modelos base do HuggingFace).
          # Complementa o nosso SBOM com provenance do modelo pré-treinado.
          if [ -n "$HF_MODEL_ID" ]; then
            echo "::notice::Fetching OWASP AIBOM for HuggingFace model: $HF_MODEL_ID"
            pip install requests --quiet
            python - <<'PYEOF'
import os, json, sys
import urllib.request, urllib.error

model_id = os.environ["HF_MODEL_ID"]
# OWASP AIBOM Generator API endpoint (CycloneDX JSON download)
url = f"https://aibom.owasp.org/api/generate?model={model_id}&format=cyclonedx"
try:
    req = urllib.request.Request(url, headers={"Accept": "application/json"})
    with urllib.request.urlopen(req, timeout=30) as resp:
        data = json.loads(resp.read())
    with open("results/sbom_hf_model.cdx.json", "w") as f:
        json.dump(data, f, indent=2)
    print(f"OWASP AIBOM saved: results/sbom_hf_model.cdx.json")
except urllib.error.URLError as e:
    print(f"Warning: OWASP AIBOM Generator unreachable ({e}). Skipping HF model AIBOM.")
    sys.exit(0)
PYEOF
          else
            echo "::notice::HF_MODEL_ID not set — skipping OWASP AIBOM Generator (HuggingFace models only)."
            echo "  To enable: set vars.HF_MODEL_ID in your repo/org variables."
          fi

      # ── Upload artefatos ──────────────────────────────────────────────────
      - name: Upload signed model
        uses: actions/upload-artifact@v4
        with:
          name: rf-model-signed
          path: |
            model.tar.gz
            model.tar.gz.bundle
            ${{ env.MODEL_OUTPUT_DIR }}/checksums.sha256
          retention-days: 90

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: secure-experiment-reports
          path: results/
          retention-days: 30

      - name: Post metrics to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: results/train_metrics.md
