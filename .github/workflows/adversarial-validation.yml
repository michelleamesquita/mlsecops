# Workflow 3 — Validação & Ataques Adversariais (Estágio 03)
# FGSM · PGD · Membership Inference · Model Integrity · promptfoo
#
# GENÉRICO: configure TARGET_COLUMN e MODEL_PATH para qualquer projeto ML.
# Ref: OpenSSF MLSecOps Whitepaper 2025 · MITRE ATLAS AML.T0043 · AML.T0056
#
# Estrutura de jobs (paralelismo):
#
#   setup ──┬── fgsm-eval ──┐
#           └── pgd-eval  ──┴── post-eval
#
# FGSM e PGD rodam em paralelo após o setup, economizando ~50% do tempo de CI.

name: adversarial-validation

on:
  workflow_call:
  push:
    branches: [main, staging]

# ── Configuração do projeto ───────────────────────────────────────────────────
env:
  PYTHON_VERSION: "3.11"
  DATA_CSV: "all_findings_flat.csv"
  TARGET_COLUMN: "is_risky"
  MODEL_DIR: "model"

# ── Job 1: Setup — treino, integridade, baseline ──────────────────────────────
jobs:
  setup:
    name: "Setup & Train"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install adversarial-robustness-toolbox modelscan

      # ── 0. Dados: usa real se existir, gera sintético para CI ─────────────
      - name: Provision dataset (synthetic fallback for CI)
        run: |
          if [ -f "$DATA_CSV" ]; then
            echo "::notice::Dataset real encontrado: $DATA_CSV"
          else
            echo "::warning::$DATA_CSV não encontrado — gerando dataset sintético para CI (5 000 linhas)."
            python scripts/generate_ci_data.py \
              --output "$DATA_CSV" --rows 5000 --seed 42
          fi

      - name: Train model (CI sample)
        env:
          DATA_PATH: ${{ env.DATA_CSV }}
          MODEL_OUTPUT_DIR: ${{ env.MODEL_DIR }}
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
        run: |
          python train_rf.py \
            --seed 42 \
            --experiment-name "adv-ci-${{ github.sha }}" \
            --sample 80000

      - name: Verify model integrity
        run: |
          mkdir -p results/
          python scripts/model_scan.py \
            --model "$MODEL_DIR/rf_model.pkl" \
            --output-dir results/

      - name: Verify lineage manifest
        run: |
          if [ -f "results/lineage_manifest.json" ]; then
            python scripts/lineage.py verify results/lineage_manifest.json \
              --model "$MODEL_DIR/rf_model.pkl"
          else
            echo "::warning::No lineage manifest found — skipping verification."
          fi

      # MITRE ATLAS AML.T0018 · AML.T0020
      - name: Model behavioral baseline check
        run: |
          if [ -f "$MODEL_DIR/behavioral_baseline.json" ]; then
            python scripts/model_behavioral_baseline.py \
              --data     "$DATA_CSV" \
              --target   "$TARGET_COLUMN" \
              --model    "$MODEL_DIR/rf_model.pkl" \
              --meta     "$MODEL_DIR/feature_names.json" \
              --baseline "$MODEL_DIR/behavioral_baseline.json" \
              --output-dir results/
          else
            echo "::notice::No baseline yet — creating initial behavioral baseline."
            python scripts/model_behavioral_baseline.py \
              --data   "$DATA_CSV" \
              --target "$TARGET_COLUMN" \
              --model  "$MODEL_DIR/rf_model.pkl" \
              --meta   "$MODEL_DIR/feature_names.json" \
              --update
          fi

      # Compartilha modelo + dados com jobs paralelos via artifact
      - name: Upload CI model artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-model
          path: |
            ${{ env.MODEL_DIR }}/
            ${{ env.DATA_CSV }}
            results/
          retention-days: 1

# ── Job 2a: FGSM + Sanitization + BinaryDetector (paralelo) ─────────────────
  fgsm-eval:
    name: "FGSM + Sanitization + Detector"
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install adversarial-robustness-toolbox

      - name: Download CI model artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-model

      # ── FGSM robustness ───────────────────────────────────────────────────
      # continue-on-error: true — sanitização a seguir aplica defesa se falhar.
      # MITRE ATLAS AML.T0043 · AML.T0015
      - name: FGSM robustness (ε=0.1, min-acc=0.75)
        continue-on-error: true
        run: |
          python scripts/adversarial_eval.py \
            --data      "$DATA_CSV" \
            --target    "$TARGET_COLUMN" \
            --model     "$MODEL_DIR/rf_model.pkl" \
            --meta      "$MODEL_DIR/feature_names.json" \
            --attack    fgsm \
            --epsilon   0.1 \
            --n-samples 50 \
            --min-accuracy 0.75

      # ── Input Sanitization — FGSM ─────────────────────────────────────────
      # Aplica FeatureSqueezing + GaussianAugmentation se o gate falhou.
      # MITRE ATLAS AML.T0015 Mitigação · OWASP MLSVS V8
      - name: Input sanitization defense (FGSM)
        run: |
          python scripts/input_sanitization.py \
            --data       "$DATA_CSV" \
            --target     "$TARGET_COLUMN" \
            --model      "$MODEL_DIR/rf_model.pkl" \
            --meta       "$MODEL_DIR/feature_names.json" \
            --adv-report results/adversarial_fgsm.json \
            --n-samples  50 \
            --output     results/sanitization_fgsm.json

      # ── BinaryInputDetector ───────────────────────────────────────────────
      # Treina um detector binário limpo/adversarial como porteiro de inferência.
      # Gates: detection rate ≥ 0.70, false positive rate ≤ 0.10.
      # MITRE ATLAS AML.T0015 Mitigação · OWASP MLSVS V8
      - name: Binary input detector (train / verify)
        continue-on-error: true
        run: |
          if [ -f "$MODEL_DIR/binary_detector.pkl" ]; then
            python scripts/binary_input_detector.py \
              --data       "$DATA_CSV" \
              --target     "$TARGET_COLUMN" \
              --model      "$MODEL_DIR/rf_model.pkl" \
              --meta       "$MODEL_DIR/feature_names.json" \
              --detector   "$MODEL_DIR/binary_detector.pkl" \
              --n-samples  50 \
              --verify \
              --output-dir results/
          else
            python scripts/binary_input_detector.py \
              --data       "$DATA_CSV" \
              --target     "$TARGET_COLUMN" \
              --model      "$MODEL_DIR/rf_model.pkl" \
              --meta       "$MODEL_DIR/feature_names.json" \
              --n-samples  50 \
              --output-dir results/
          fi

      - name: Upload FGSM results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-fgsm
          path: results/
          retention-days: 1

# ── Job 2b: PGD + Sanitization (paralelo com FGSM) ───────────────────────────
  pgd-eval:
    name: "PGD + Sanitization"
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install adversarial-robustness-toolbox

      - name: Download CI model artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-model

      # ── PGD robustness ────────────────────────────────────────────────────
      # MITRE ATLAS AML.T0043 · AML.T0015
      - name: PGD robustness (ε=0.05, steps=100, min-acc=0.70)
        continue-on-error: true
        run: |
          python scripts/adversarial_eval.py \
            --data      "$DATA_CSV" \
            --target    "$TARGET_COLUMN" \
            --model     "$MODEL_DIR/rf_model.pkl" \
            --meta      "$MODEL_DIR/feature_names.json" \
            --attack    pgd \
            --epsilon   0.05 \
            --steps     100 \
            --n-samples 50 \
            --min-accuracy 0.70

      # ── Input Sanitization — PGD ──────────────────────────────────────────
      - name: Input sanitization defense (PGD)
        run: |
          python scripts/input_sanitization.py \
            --data       "$DATA_CSV" \
            --target     "$TARGET_COLUMN" \
            --model      "$MODEL_DIR/rf_model.pkl" \
            --meta       "$MODEL_DIR/feature_names.json" \
            --adv-report results/adversarial_pgd.json \
            --n-samples  50 \
            --output     results/sanitization_pgd.json

      - name: Upload PGD results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-pgd
          path: results/
          retention-days: 1

# ── Job 3: Post-eval — checks restantes + compliance gate ────────────────────
  post-eval:
    name: "Post-Attack Checks & Compliance"
    runs-on: ubuntu-latest
    needs: [fgsm-eval, pgd-eval]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install adversarial-robustness-toolbox pyyaml

      - name: Download CI model artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-model

      # Baixa e mescla resultados de FGSM e PGD em results/
      - name: Download attack results (FGSM + PGD)
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: results/
          merge-multiple: true

      # ── 3. Membership Inference (privacidade) ─────────────────────────────
      # MITRE ATLAS AML.T0056
      - name: Membership inference (max-advantage=0.10)
        run: |
          python scripts/membership_inference.py \
            --data          "$DATA_CSV" \
            --target        "$TARGET_COLUMN" \
            --model         "$MODEL_DIR/rf_model.pkl" \
            --meta          "$MODEL_DIR/feature_names.json" \
            --max-advantage 0.10

      # ── 4. Poison Detection pós-treino (double check) ─────────────────────
      - name: Post-training poison detection
        run: |
          python scripts/poison_detection.py \
            --data   "$DATA_CSV" \
            --target "$TARGET_COLUMN" \
            --output-dir results/

      # ── 4b. Model Extraction Test (AML.T0044) ─────────────────────────────
      - name: Model extraction test (Knockoff, AML.T0044)
        run: |
          python scripts/model_extraction_test.py \
            --data          "$DATA_CSV" \
            --target        "$TARGET_COLUMN" \
            --model         "$MODEL_DIR/rf_model.pkl" \
            --meta          "$MODEL_DIR/feature_names.json" \
            --n-queries     5000 \
            --max-fidelity  0.90

      # ── 5. promptfoo red-team (LLMs) ──────────────────────────────────────
      # Só executa se houver endpoint LLM configurado via secret.
      - name: Install promptfoo
        if: env.LLM_ENDPOINT != '' || env.OPENAI_API_KEY != ''
        run: npm install -g promptfoo
        env:
          LLM_ENDPOINT:   ${{ secrets.LLM_ENDPOINT || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}

      - name: promptfoo red-team
        if: (env.LLM_ENDPOINT != '' || env.OPENAI_API_KEY != '') && hashFiles('promptfoo.yaml') != ''
        run: |
          promptfoo redteam run \
            --config promptfoo.yaml \
            --output results/redteam.json
        continue-on-error: true
        env:
          LLM_ENDPOINT:   ${{ secrets.LLM_ENDPOINT || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || '' }}

      # ── 6. Garak — LLM vulnerability scanner (NVIDIA) ────────────────────
      - name: Garak LLM security scan
        if: env.LLM_ENDPOINT != ''
        run: |
          pip install garak
          python -m garak \
            --model rest \
            --probes dan,encoding,knownbadsignatures,malwaregen \
            --report_prefix results/garak \
            || true
        env:
          LLM_ENDPOINT: ${{ secrets.LLM_ENDPOINT || '' }}
        continue-on-error: true

      # ── 7. Compliance Gate ────────────────────────────────────────────────
      # Lê policy.yml e verifica todos os gates bloqueantes passaram.
      # OWASP MLSVS V10 — nenhum modelo promovido sem este gate.
      - name: Compliance Gate
        run: |
          python scripts/compliance_check.py \
            --policy policy.yml \
            --results results/ \
            --output results/compliance_report.json

      # ── Upload relatórios finais ───────────────────────────────────────────
      - name: Upload all adversarial reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adversarial-reports
          path: results/
          retention-days: 30
